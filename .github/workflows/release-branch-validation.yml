name: Release Branch Validation

on:
  push:
    branches:
      - 'release/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name format
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          if [[ ! "$BRANCH" =~ ^release/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Branch name '$BRANCH' does not match required pattern 'release/X.X.X' (numeric only)"
            exit 1
          fi
          echo "Branch name is valid"
          echo "VERSION=${BRANCH#release/}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate package.json version matches branch
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"
          echo "Branch version: $VERSION"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match branch version ($VERSION)"
            exit 1
          fi
          echo "Versions match"
