name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (macOS arm64)
        run: npx electron-vite build && npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (Windows x64)
        run: npx electron-vite build && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and release type
        id: release_info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ -(alpha|beta) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Write release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Installation

          ### macOS

          1. Download the `.dmg` file below
          2. Open it and drag **Git Buddy** into your Applications folder
          3. Open Terminal and run:
             ```
             xattr -cr /Applications/Git\ Buddy.app
             ```
          4. Launch Git Buddy from your Applications folder

          > **Why the Terminal step?** macOS blocks apps that aren't from the App Store until you explicitly trust them. This is normal for free, open-source tools — the command removes the quarantine flag. Code signing requires a paid yearly certificate; we'll add it once the app has enough users to justify the cost.

          ### Windows

          1. Download the `.exe` installer below
          2. Run the installer
          3. If Windows SmartScreen appears, click **More info** → **Run anyway**
          4. Launch Git Buddy from the Start menu

          > **Why the SmartScreen warning?** Windows warns about apps from unknown publishers. This is expected for open-source tools without a paid code signing certificate. We'll add signing once the app has enough users to justify the yearly cost.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: Git Buddy ${{ steps.release_info.outputs.tag }}
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          body_path: release-notes.md
          files: |
            artifacts/mac-build/*.dmg
            artifacts/windows-build/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
